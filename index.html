<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tropical on Rails 2026 — Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFFDF7;--surface:#FFF;--surface2:#F8F6F0;--text:#1A1A18;--muted:#6B6960;--border:#E8E5DB;
  --keynote:#534AB7;--keynote-bg:#EEEDFE;--keynote-text:#3C3489;
  --talk:#1D9E75;--talk-bg:#E1F5EE;--talk-text:#085041;
  --sponsor:#BA7517;--sponsor-bg:#FAEEDA;--sponsor-text:#633806;
  --abertura:#888780;--abertura-bg:#F1EFE8;--abertura-text:#444441;
  --workshop:#D85A30;--workshop-bg:#FAECE7;--workshop-text:#712B13;
  --video:#185FA5;--video-bg:#E6F1FB;--video-text:#0C447C;
  --trend:#D4537E;--trend-bg:#FBEAF0;--trend-text:#72243E;
  --accent:#E85D2A;--accent2:#1D9E75;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{
  background:linear-gradient(135deg,#1A1A18 0%,#2C2B28 100%);
  color:#fff;padding:2.5rem 2rem 2rem;position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;top:-50%;right:-10%;width:400px;height:400px;
  background:radial-gradient(circle,rgba(232,93,42,0.15) 0%,transparent 70%);pointer-events:none;
}
.header::after{
  content:'';position:absolute;bottom:-30%;left:20%;width:300px;height:300px;
  background:radial-gradient(circle,rgba(29,158,117,0.1) 0%,transparent 70%);pointer-events:none;
}
.header h1{font-size:1.75rem;font-weight:700;letter-spacing:-0.03em;position:relative;z-index:1}
.header p{color:rgba(255,255,255,0.6);font-size:0.875rem;margin-top:0.25rem;position:relative;z-index:1}
.header .badge{
  display:inline-block;background:var(--accent);color:#fff;font-size:0.7rem;font-weight:700;
  padding:3px 10px;border-radius:20px;margin-top:0.75rem;letter-spacing:0.05em;position:relative;z-index:1;
}

.container{max-width:820px;margin:0 auto;padding:0 1.25rem 3rem}

.controls{
  display:flex;gap:0.5rem;margin:1.5rem 0 1rem;flex-wrap:wrap;
  position:sticky;top:0;z-index:10;background:var(--bg);padding:0.75rem 0;
}
.tab{
  padding:0.5rem 1rem;border-radius:8px;font-size:0.8rem;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);
  transition:all 0.2s;font-family:inherit;
}
.tab:hover{border-color:#ccc}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.tab .count{
  display:inline-block;background:rgba(0,0,0,0.08);padding:1px 6px;border-radius:10px;
  font-size:0.7rem;margin-left:4px;font-family:'JetBrains Mono',monospace;
}
.tab.active .count{background:rgba(255,255,255,0.2)}

.filter-tabs{display:flex;gap:0.35rem;margin-bottom:1.25rem;flex-wrap:wrap}
.ftab{
  padding:0.35rem 0.75rem;border-radius:6px;font-size:0.75rem;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);
  transition:all 0.15s;font-family:inherit;
}
.ftab:hover{background:var(--surface2)}
.ftab.active{background:var(--text);color:#fff;border-color:var(--text)}

.legend{
  display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;font-size:0.7rem;color:var(--muted);
}
.legend span{display:inline-flex;align-items:center;gap:4px}
.legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

.day-header{
  font-size:0.95rem;font-weight:700;color:var(--text);margin:1.75rem 0 0.5rem;
  padding-bottom:0.5rem;border-bottom:2px solid var(--text);
  display:flex;justify-content:space-between;align-items:baseline;
}
.day-header:first-child{margin-top:0}
.day-header .day-count{
  font-size:0.7rem;font-weight:500;color:var(--muted);
  font-family:'JetBrains Mono',monospace;
}

.post{display:flex;gap:0.75rem;margin-bottom:2px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.post-time{
  width:44px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;
}
.post-time span{
  font-size:0.7rem;font-weight:500;color:var(--muted);white-space:nowrap;
  font-family:'JetBrains Mono',monospace;
}
.post-line{width:2px;flex:1;background:var(--border);margin:4px 0;min-height:12px}
.post-card{
  flex:1;border-left:3px solid;border-radius:0 8px 8px 0;padding:0.55rem 0.85rem;
  margin-bottom:0.4rem;transition:transform 0.15s;
}
.post-card:hover{transform:translateX(2px)}
.post-label{font-size:0.8rem;font-weight:600;line-height:1.3}
.post-desc{font-size:0.72rem;opacity:0.75;margin-top:2px;line-height:1.4}
.post-fmt{
  display:inline-block;font-size:0.6rem;font-weight:700;letter-spacing:0.05em;
  text-transform:uppercase;margin-top:4px;opacity:0.5;font-family:'JetBrains Mono',monospace;
}

.summary{
  margin-top:2rem;padding:1rem 1.25rem;background:var(--surface2);border-radius:10px;
  font-size:0.8rem;color:var(--muted);display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center;
}
.summary strong{color:var(--text);font-family:'JetBrains Mono',monospace}
.summary-item{text-align:center}
.summary-num{font-size:1.5rem;font-weight:700;color:var(--text);display:block;font-family:'JetBrains Mono',monospace}

@media(max-width:600px){
  .header{padding:1.5rem 1rem 1.25rem}
  .header h1{font-size:1.3rem}
  .controls{gap:0.35rem}
  .tab{padding:0.4rem 0.75rem;font-size:0.75rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>Tropical on Rails 2026</h1>
  <p>Content calendar — 08 a 11 de abril</p>
  <span class="badge">PLANEJAMENTO DE CONTEUDO</span>
</div>

<div class="container">
  <div class="controls">
    <button class="tab active" onclick="setView('all')" id="vAll">Todos <span class="count" id="cAll"></span></button>
    <button class="tab" onclick="setView('static')" id="vStatic">Estaticos <span class="count" id="cStatic"></span></button>
    <button class="tab" onclick="setView('video')" id="vVideo">Videos <span class="count" id="cVideo"></span></button>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" onclick="setDay('all')" id="dAll">Todos os dias</button>
    <button class="ftab" onclick="setDay('08/abr')" id="d08">08/abr</button>
    <button class="ftab" onclick="setDay('09/abr')" id="d09">09/abr</button>
    <button class="ftab" onclick="setDay('10/abr')" id="d10">10/abr</button>
    <button class="ftab" onclick="setDay('11/abr')" id="d11">11/abr</button>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:var(--keynote)"></span> Keynote</span>
    <span><span class="dot" style="background:var(--talk)"></span> Talk</span>
    <span><span class="dot" style="background:var(--sponsor)"></span> Sponsor</span>
    <span><span class="dot" style="background:var(--abertura)"></span> Abertura/Encerramento</span>
    <span><span class="dot" style="background:var(--workshop)"></span> Workshop</span>
    <span><span class="dot" style="background:var(--video)"></span> Video</span>
    <span><span class="dot" style="background:var(--trend)"></span> Trend</span>
  </div>

  <div id="content"></div>

  <div class="summary" id="summary"></div>
</div>

<script>
const posts = [
  {day:"08/abr",h:"07:50",type:"workshop",label:"Workshop 1 — Starting now",desc:"Modularizing Rails Applications — Rodrigo Serradura",fmt:"static"},
  {day:"08/abr",h:"12:30",type:"video",label:"Video recap — Workshop 1",desc:"Video do workshop Serradura",fmt:"video"},
  {day:"08/abr",h:"13:50",type:"workshop",label:"Workshop 2 — Starting now",desc:"Inertia Rails — Evil Martians",fmt:"static"},
  {day:"08/abr",h:"18:30",type:"video",label:"Video recap — Workshop 2",desc:"Video do workshop Evil Martians",fmt:"video"},

  {day:"09/abr",h:"08:30",type:"abertura",label:"Day 1 is here!",desc:"Abertura — credenciamento + welcome coffee",fmt:"static"},
  {day:"09/abr",h:"09:30",type:"video",label:"What's in your bag?",desc:"Devs mostram o setup que trouxeram pro evento",fmt:"video"},
  {day:"09/abr",h:"10:00",type:"keynote",label:"Now on stage — Keynote",desc:"Marco Roth — Consultant @ Independent",fmt:"static"},
  {day:"09/abr",h:"11:00",type:"talk",label:"Now on stage",desc:"Rachael Wright-Munn — Unboxing Devcontainers and Docker for Rubyists",fmt:"static"},
  {day:"09/abr",h:"11:40",type:"talk",label:"Now on stage",desc:"Miguel Marcondes Filho — ActiveRecord::Tenanted and SQLite",fmt:"static"},
  {day:"09/abr",h:"12:15",type:"video",label:"Entrevista participantes",desc:"Entrevista com devs/participantes no evento",fmt:"video"},
  {day:"09/abr",h:"12:45",type:"sponsor",label:"Video sponsor — Platinum",desc:"Shopify, Jaya Tech, Braze, TypeSense",fmt:"video"},
  {day:"09/abr",h:"14:00",type:"talk",label:"Now on stage",desc:"Nicolas Erlichman — Modeling Class Hierarchies in Active Record",fmt:"static"},
  {day:"09/abr",h:"14:40",type:"talk",label:"Now on stage",desc:"Igor Aleksandrov — Overreacting: from React to Hotwire",fmt:"static"},
  {day:"09/abr",h:"15:20",type:"talk",label:"Now on stage",desc:"Braulio Martinez — Passkey Authentication on Rails",fmt:"static"},
  {day:"09/abr",h:"15:50",type:"video",label:"Entrevista speakers lounge",desc:"Entrevista com speakers no lounge",fmt:"video"},
  {day:"09/abr",h:"16:00",type:"trend",label:"Video trend 1",desc:"Trend/reels do dia",fmt:"video"},
  {day:"09/abr",h:"16:30",type:"talk",label:"Now on stage",desc:"Luiz Carvalho — DefGPT: Plataforma de agentes de IA em Rails",fmt:"static"},
  {day:"09/abr",h:"17:10",type:"talk",label:"Now on stage",desc:"Rodrigo Serradura — The Monolith Strikes Back",fmt:"static"},
  {day:"09/abr",h:"17:50",type:"keynote",label:"Now on stage — Keynote",desc:"Adrianna Chang — Staff Engineer @ Shopify",fmt:"static"},
  {day:"09/abr",h:"19:00",type:"abertura",label:"Post estatico — Day 1 wrap",desc:"Melhores momentos do dia 1",fmt:"static"},
  {day:"09/abr",h:"19:30",type:"video",label:"Video sameday — Day 1",desc:"Video sameday editado pela equipe de midia",fmt:"video"},
  {day:"09/abr",h:"20:00",type:"sponsor",label:"Video sponsor — Gold",desc:"Smartfit, JetRockets, Publitas, Adaflow, Appsignal",fmt:"video"},
  {day:"09/abr",h:"20:30",type:"video",label:"Rails Girls",desc:"Entrevista Rails Girls",fmt:"video"},
  {day:"09/abr",h:"21:00",type:"video",label:"How I got into Ruby",desc:"Mini depoimentos de 30s — como entraram pro Ruby",fmt:"video"},

  {day:"10/abr",h:"08:30",type:"sponsor",label:"Post — Apoiadores",desc:"Packt, Glass Data, AVO",fmt:"static"},
  {day:"10/abr",h:"08:45",type:"sponsor",label:"Post — Organizadora",desc:"Linkana (@LinkanaBR)",fmt:"static"},
  {day:"10/abr",h:"09:00",type:"abertura",label:"Day 2 is here!",desc:"Abertura — networking + welcome coffee",fmt:"static"},
  {day:"10/abr",h:"10:00",type:"keynote",label:"Now on stage — Keynote",desc:"Fabio Akita — Board of Directors @ Codeminer42",fmt:"static"},
  {day:"10/abr",h:"11:00",type:"talk",label:"Now on stage",desc:"Talysson Cassiano — Privacy on Rails",fmt:"static"},
  {day:"10/abr",h:"11:40",type:"talk",label:"Now on stage",desc:"Ignacio Chiazzo Cardarello — Reordering items at scale: O(n) to O(1)",fmt:"static"},
  {day:"10/abr",h:"12:15",type:"video",label:"Entrevista participantes",desc:"Entrevista com devs/participantes dia 2",fmt:"video"},
  {day:"10/abr",h:"12:45",type:"sponsor",label:"Video sponsor — Silver",desc:"Husky, Planet Argon, Monde, Capim, Irya, V360, Doximity, Saeloun, KnowBe4, TechFX, Cedarcode",fmt:"video"},
  {day:"10/abr",h:"14:00",type:"talk",label:"Now on stage — Lightning Talks",desc:"Lightning Talks",fmt:"static"},
  {day:"10/abr",h:"14:40",type:"talk",label:"Now on stage",desc:"Matheus Richard — Production Data Doesn't Have to Be Scary",fmt:"static"},
  {day:"10/abr",h:"15:20",type:"talk",label:"Now on stage",desc:"Rafael Pena-Azar — Generators Are APIs: Better DX in Rails",fmt:"static"},
  {day:"10/abr",h:"16:00",type:"trend",label:"Video trend 2",desc:"Trend/reels do dia",fmt:"video"},
  {day:"10/abr",h:"16:10",type:"video",label:"Giveaway check",desc:"Devs mostram brindes e adesivos dos stands e sacolas",fmt:"video"},
  {day:"10/abr",h:"16:30",type:"talk",label:"Now on stage",desc:"Greg Molnar — Build Secure Rails Apps: OWASP Top 10",fmt:"static"},
  {day:"10/abr",h:"17:10",type:"talk",label:"Now on stage",desc:"Pawel Strzalkowski — MCP & OAuth on Rails",fmt:"static"},
  {day:"10/abr",h:"17:30",type:"video",label:"Sponsor devs",desc:"Entrevista com devs enviados dos sponsors",fmt:"video"},
  {day:"10/abr",h:"17:50",type:"keynote",label:"Now on stage — Keynote",desc:"Vladimir Dementyev — Software Engineer @ Evil Martians",fmt:"static"},
  {day:"10/abr",h:"18:00",type:"sponsor",label:"Video — Todos os sponsors",desc:"Video geral: Platinum + Gold + Silver",fmt:"video"},
  {day:"10/abr",h:"19:00",type:"abertura",label:"Happy hour!",desc:"Post do happy hour — local externo",fmt:"static"},
  {day:"10/abr",h:"19:15",type:"video",label:"Did you like it?",desc:"Mensagens dos speakers sobre o Tropical on Rails",fmt:"video"},
  {day:"10/abr",h:"19:30",type:"abertura",label:"Post estatico — That's a wrap!",desc:"Encerramento — agradecimento, numeros",fmt:"static"},
  {day:"10/abr",h:"20:00",type:"video",label:"Video sameday — Day 2 / Final",desc:"Video sameday final — fecha o Tropical on Rails 2026",fmt:"video"},

  {day:"11/abr",h:"AM",type:"video",label:"Speakers dinner",desc:"Video do jantar dos speakers (noite do dia 09)",fmt:"video"},
  {day:"11/abr",h:"PM",type:"abertura",label:"Post agradecimento final",desc:"Agradecimento geral — speakers, participantes, equipe",fmt:"static"},
];

const typeColors = {
  keynote:{bg:'var(--keynote-bg)',border:'var(--keynote)',text:'var(--keynote-text)'},
  talk:{bg:'var(--talk-bg)',border:'var(--talk)',text:'var(--talk-text)'},
  sponsor:{bg:'var(--sponsor-bg)',border:'var(--sponsor)',text:'var(--sponsor-text)'},
  abertura:{bg:'var(--abertura-bg)',border:'var(--abertura)',text:'var(--abertura-text)'},
  workshop:{bg:'var(--workshop-bg)',border:'var(--workshop)',text:'var(--workshop-text)'},
  video:{bg:'var(--video-bg)',border:'var(--video)',text:'var(--video-text)'},
  trend:{bg:'var(--trend-bg)',border:'var(--trend)',text:'var(--trend-text)'},
};

const dayLabels = {
  '08/abr':'08/abr — Workshops (Live University)',
  '09/abr':'09/abr — Dia 1 (Pullman Vila Olimpia)',
  '10/abr':'10/abr — Dia 2 (Pullman Vila Olimpia)',
  '11/abr':'11/abr — Pos-evento'
};

let currentView = 'all';
let currentDay = 'all';

function setView(v){
  currentView = v;
  document.querySelectorAll('.controls .tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('v'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('active');
  render();
}
function setDay(d){
  currentDay = d;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  if(d==='all') document.getElementById('dAll').classList.add('active');
  else document.getElementById('d'+d.substring(0,2)).classList.add('active');
  render();
}

function render(){
  let filtered = posts;
  if(currentView==='static') filtered = filtered.filter(p=>p.fmt==='static');
  if(currentView==='video') filtered = filtered.filter(p=>p.fmt==='video');
  if(currentDay!=='all') filtered = filtered.filter(p=>p.day===currentDay);

  let html = '';
  let curDay = '';
  filtered.forEach((p,i)=>{
    if(p.day !== curDay){
      curDay = p.day;
      const dayPosts = filtered.filter(x=>x.day===curDay);
      html += `<div class="day-header">${dayLabels[curDay]||curDay} <span class="day-count">${dayPosts.length} posts</span></div>`;
    }
    const c = typeColors[p.type];
    const sameDay = filtered.filter(x=>x.day===p.day);
    const idxInDay = sameDay.indexOf(p);
    const hasNext = idxInDay < sameDay.length - 1;
    const fmtLabel = p.fmt === 'video' ? 'VIDEO' : 'ESTATICO';

    html += `<div class="post">
      <div class="post-time">
        <span>${p.h}</span>
        ${hasNext?'<div class="post-line"></div>':''}
      </div>
      <div class="post-card" style="background:${c.bg};border-left-color:${c.border};color:${c.text}">
        <div class="post-label">${p.label}</div>
        <div class="post-desc">${p.desc}</div>
        <span class="post-fmt">${fmtLabel}</span>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;

  const totalAll = posts.length;
  const totalStatic = posts.filter(p=>p.fmt==='static').length;
  const totalVideo = posts.filter(p=>p.fmt==='video').length;
  document.getElementById('cAll').textContent = totalAll;
  document.getElementById('cStatic').textContent = totalStatic;
  document.getElementById('cVideo').textContent = totalVideo;

  const viewLabel = currentView==='all'?'Total':currentView==='static'?'Estaticos':'Videos';
  document.getElementById('summary').innerHTML = `
    <div class="summary-item"><span class="summary-num">${filtered.length}</span>${viewLabel} ${currentDay!=='all'?'('+currentDay+')':''}</div>
    <div class="summary-item"><span class="summary-num">${filtered.filter(p=>p.day==='08/abr').length}</span>08/abr</div>
    <div class="summary-item"><span class="summary-num">${filtered.filter(p=>p.day==='09/abr').length}</span>09/abr</div>
    <div class="summary-item"><span class="summary-num">${filtered.filter(p=>p.day==='10/abr').length}</span>10/abr</div>
    <div class="summary-item"><span class="summary-num">${filtered.filter(p=>p.day==='11/abr').length}</span>11/abr</div>
  `;
}

render();
</script>
</body>
</html>
